<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mitr Pipecat Web Simulator</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: #f7f7f4;
        color: #20211d;
      }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 24px;
        color: #5b5e55;
      }
      .panel {
        display: grid;
        gap: 14px;
        padding: 18px;
        border: 1px solid #d7d7cf;
        border-radius: 8px;
        background: #ffffff;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #4b4e47;
      }
      input {
        min-height: 38px;
        border: 1px solid #c8c9bf;
        border-radius: 6px;
        padding: 0 10px;
        font: inherit;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        min-height: 40px;
        border: 1px solid #21251f;
        border-radius: 6px;
        background: #21251f;
        color: #fff;
        padding: 0 14px;
        font: inherit;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #21251f;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      pre {
        min-height: 280px;
        max-height: 420px;
        overflow: auto;
        padding: 14px;
        border-radius: 8px;
        background: #11140f;
        color: #d8f5c8;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mitr Pipecat Web Simulator</h1>
      <p>Direct test path: browser mic PCM16 -> Pipecat gateway -> OpenAI Realtime -> browser speaker.</p>

      <section class="panel">
        <label>
          API base URL
          <input id="apiBase" value="http://127.0.0.1:8080" />
        </label>
        <label>
          User bearer token
          <input id="token" placeholder="Paste app access token" />
        </label>
        <label>
          Language
          <input id="language" value="hi-IN" />
        </label>
        <div class="row">
          <button id="loginTest" class="secondary">Login test user</button>
          <button id="swiggyStatus" class="secondary">Swiggy status</button>
          <button id="swiggyConnect" class="secondary">Connect Swiggy</button>
          <button id="connect">Connect</button>
          <button id="disconnect" class="secondary" disabled>Disconnect</button>
        </div>
      </section>

      <pre id="log"></pre>
    </main>

    <script>
      const apiBaseInput = document.getElementById("apiBase");
      const tokenInput = document.getElementById("token");
      const languageInput = document.getElementById("language");
      const loginTestButton = document.getElementById("loginTest");
      const swiggyStatusButton = document.getElementById("swiggyStatus");
      const swiggyConnectButton = document.getElementById("swiggyConnect");
      const connectButton = document.getElementById("connect");
      const disconnectButton = document.getElementById("disconnect");
      const logEl = document.getElementById("log");

      let ws = null;
      let audioContext = null;
      let sourceNode = null;
      let processorNode = null;
      let mediaStream = null;
      let playbackTime = 0;

      const log = (event, payload = "") => {
        const line = `${new Date().toISOString()} ${event} ${typeof payload === "string" ? payload : JSON.stringify(payload)}`;
        logEl.textContent += `${line}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      };

      const params = new URLSearchParams(window.location.search);
      const initialApiHost = params.get("apiHost") || params.get("host") || localStorage.getItem("mitr_websim_host");
      if (initialApiHost) apiBaseInput.value = initialApiHost;
      const savedToken = localStorage.getItem("mitr_websim_token");
      if (savedToken) tokenInput.value = savedToken;
      if (params.get("swiggy")) log("swiggy_redirect", Object.fromEntries(params.entries()));

      const apiBase = () => {
        const value = apiBaseInput.value.trim().replace(/\/+$/, "");
        localStorage.setItem("mitr_websim_host", value);
        return value;
      };

      const bearerToken = () => {
        const value = tokenInput.value.trim();
        if (value) localStorage.setItem("mitr_websim_token", value);
        return value;
      };

      const requireToken = () => {
        const token = bearerToken();
        if (!token) {
          log("error", "missing bearer token");
          return null;
        }
        return token;
      };

      loginTestButton.onclick = async () => {
        try {
          const res = await fetch(`${apiBase()}/auth/email/login`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ email: "tester@gmail.com", password: "12345678910" }),
          });
          if (!res.ok) throw new Error(await res.text());
          const payload = await res.json();
          tokenInput.value = payload.session.accessToken;
          localStorage.setItem("mitr_websim_token", payload.session.accessToken);
          log("login", { userId: payload.user.id, email: payload.user.email });
        } catch (error) {
          log("error", error.message || String(error));
        }
      };

      swiggyStatusButton.onclick = async () => {
        const token = requireToken();
        if (!token) return;
        try {
          const res = await fetch(`${apiBase()}/auth/swiggy/status`, {
            headers: { authorization: `Bearer ${token}` },
          });
          if (!res.ok) throw new Error(await res.text());
          log("swiggy_status", await res.json());
        } catch (error) {
          log("error", error.message || String(error));
        }
      };

      swiggyConnectButton.onclick = async () => {
        const token = requireToken();
        if (!token) return;
        try {
          const res = await fetch(`${apiBase()}/auth/swiggy/start`, {
            method: "POST",
            headers: { authorization: `Bearer ${token}` },
          });
          if (!res.ok) throw new Error(await res.text());
          const payload = await res.json();
          log("swiggy_start", payload);
          window.location.href = payload.authorizeUrl;
        } catch (error) {
          log("error", error.message || String(error));
        }
      };

      const floatToPcm16 = (input) => {
        const output = new Int16Array(input.length);
        for (let i = 0; i < input.length; i += 1) {
          const sample = Math.max(-1, Math.min(1, input[i]));
          output[i] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
        }
        return output;
      };

      const downsample = (input, inputRate, outputRate) => {
        if (inputRate === outputRate) return input;
        const ratio = inputRate / outputRate;
        const length = Math.floor(input.length / ratio);
        const output = new Float32Array(length);
        for (let i = 0; i < length; i += 1) {
          output[i] = input[Math.floor(i * ratio)] || 0;
        }
        return output;
      };

      const playPcm16 = async (arrayBuffer) => {
        if (!audioContext) return;
        const pcm = new Int16Array(arrayBuffer);
        const floats = new Float32Array(pcm.length);
        for (let i = 0; i < pcm.length; i += 1) {
          floats[i] = Math.max(-1, Math.min(1, pcm[i] / 32768));
        }
        const buffer = audioContext.createBuffer(1, floats.length, 16000);
        buffer.copyToChannel(floats, 0);
        const node = audioContext.createBufferSource();
        node.buffer = buffer;
        node.connect(audioContext.destination);
        playbackTime = Math.max(playbackTime, audioContext.currentTime);
        node.start(playbackTime);
        playbackTime += buffer.duration;
      };

      const startMic = async () => {
        audioContext = new AudioContext();
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          },
        });
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        processorNode = audioContext.createScriptProcessor(2048, 1, 1);
        processorNode.onaudioprocess = (event) => {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          const mono = event.inputBuffer.getChannelData(0);
          const pcm16 = floatToPcm16(downsample(mono, audioContext.sampleRate, 16000));
          ws.send(pcm16.buffer);
        };
        sourceNode.connect(processorNode);
        processorNode.connect(audioContext.destination);
      };

      const stopMic = () => {
        if (processorNode) processorNode.disconnect();
        if (sourceNode) sourceNode.disconnect();
        if (mediaStream) mediaStream.getTracks().forEach((track) => track.stop());
        if (audioContext) void audioContext.close();
        processorNode = null;
        sourceNode = null;
        mediaStream = null;
        audioContext = null;
      };

      connectButton.onclick = async () => {
        const base = apiBase();
        const token = bearerToken();
        const language = languageInput.value.trim() || "hi-IN";
        if (!token) {
          log("error", "missing bearer token");
          return;
        }

        connectButton.disabled = true;
        try {
          const connectRes = await fetch(`${base}/pipecat/connect`, {
            method: "POST",
            headers: {
              "content-type": "application/json",
              authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ language }),
          });
          if (!connectRes.ok) throw new Error(await connectRes.text());
          const connectInfo = await connectRes.json();
          const wsUrl = new URL(connectInfo.wsUrl);
          wsUrl.searchParams.set("client", "web");
          wsUrl.searchParams.set("language", language);

          ws = new WebSocket(wsUrl.toString(), ["mitr-pcm16", `mitr-token-${token}`]);
          ws.binaryType = "arraybuffer";
          ws.onopen = async () => {
            log("connected", wsUrl.toString());
            ws.send(JSON.stringify({ type: "hello", client: "web", language, ts: Date.now() }));
            await startMic();
            disconnectButton.disabled = false;
          };
          ws.onmessage = (event) => {
            if (typeof event.data === "string") {
              log("gateway", event.data);
            } else {
              void playPcm16(event.data);
            }
          };
          ws.onclose = (event) => {
            log("closed", { code: event.code, reason: event.reason });
            stopMic();
            connectButton.disabled = false;
            disconnectButton.disabled = true;
          };
          ws.onerror = () => log("error", "websocket error");
        } catch (error) {
          log("error", error.message || String(error));
          connectButton.disabled = false;
        }
      };

      disconnectButton.onclick = () => {
        if (ws) ws.close();
        stopMic();
      };
    </script>
  </body>
</html>
