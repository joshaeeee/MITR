<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mitr</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f5ef;
        --card: #ffffff;
        --text: #18212b;
        --muted: #5c6773;
        --line: #d8dde3;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 32%),
          linear-gradient(180deg, #faf9f5 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 720px);
        padding: 48px 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 80px rgba(24, 33, 43, 0.08);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 0.98;
      }

      p {
        margin: 18px 0 0;
        max-width: 44ch;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      code {
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.08);
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.92em;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Mitr</p>
      <h1>Web experience coming soon.</h1>
      <p>
        The future web app will live here. The backend API now runs separately at
        <code>api.heyreca.com</code>.
      </p>
    </main>
  </body>
</html>
