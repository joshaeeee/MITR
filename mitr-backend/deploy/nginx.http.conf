worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  log_format mitr_safe '$remote_addr [$time_local] "$request_method $uri $server_protocol" '
                       '$status $body_bytes_sent $request_time';
  access_log /var/log/nginx/access.log mitr_safe;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  resolver 127.0.0.11 valid=30s ipv6=off;
  limit_req_zone $binary_remote_addr zone=mitr_api_per_ip:10m rate=10r/s;

  server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 15m;
    proxy_connect_timeout 15s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    location /.well-known/acme-challenge/ {
      alias /var/www/certbot/.well-known/acme-challenge/;
    }

    location = /ws {
      set $mitr_pipecat_gateway http://pipecat-gateway:7860;
      proxy_pass $mitr_pipecat_gateway;
      proxy_http_version 1.1;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location = /connect {
      set $mitr_pipecat_gateway http://pipecat-gateway:7860;
      proxy_pass $mitr_pipecat_gateway;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /internal {
      return 404;
    }

    location / {
      limit_req zone=mitr_api_per_ip burst=60 nodelay;
      set $mitr_api http://api:8080;
      proxy_pass $mitr_api;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
