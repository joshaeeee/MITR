services:
  redis:
    image: redis:7-alpine
    container_name: mitr-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "96mb", "--maxmemory-policy", "allkeys-lru"]
    cpus: 0.10
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mitr-internal

  api:
    image: ${API_IMAGE}
    container_name: mitr-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 8080
      NODE_OPTIONS: --max-old-space-size=384
    command: ["node", "dist/src/index.js"]
    expose:
      - "8080"
    cpus: 0.75
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - voice_notes_data:/app/var/voice-notes
    networks:
      - mitr-internal
    depends_on:
      redis:
        condition: service_started

  agent:
    image: ${AGENT_IMAGE}
    container_name: mitr-agent-worker
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=640
      INTERNAL_API_BASE_URL: http://api:8080
    command: ["node", "dist/src/agent-worker/main.js", "start"]
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
    cpus: 1.0
    mem_limit: 900m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mitr-internal

  wakeword-worker:
    image: ${WAKEWORD_WORKER_IMAGE:-mitr-wakeword-worker:local}
    build:
      context: ../../mitr-wakeword-worker
    container_name: mitr-wakeword-worker
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      REDIS_URL: ${REDIS_URL}
      WAKEWORD_INTERNAL_API_BASE_URL: http://api:8080
      WAKEWORD_INTERNAL_API_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      WAKEWORD_MODEL_MANIFEST_PATH: ${WAKEWORD_MODEL_MANIFEST_PATH:-/app/models/hey_livekit.meta.json}
      WAKEWORD_JOIN_IDENTITY_PREFIX: wakeword-worker
      WAKEWORD_DETECTION_DEBOUNCE_MS: 2000
      WAKEWORD_ROOM_IDLE_EVICT_MS: 300000
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
    cpus: 1.0
    mem_limit: 768m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mitr-internal

  reminder-worker:
    image: ${REMINDER_IMAGE}
    container_name: mitr-reminder-worker
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=192
    command: ["node", "dist/src/workers/reminder-worker.js"]
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
    cpus: 0.25
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mitr-internal

  insights-worker:
    image: ${API_IMAGE}
    container_name: mitr-insights-worker
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=320
    command: ["node", "dist/src/workers/insights-worker.js"]
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
    cpus: 0.30
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mitr-internal

  digest-worker:
    image: ${API_IMAGE}
    container_name: mitr-digest-worker
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=256
    command: ["node", "dist/src/workers/digest-worker.js"]
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
    cpus: 0.20
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mitr-internal

  nginx:
    image: nginx:1.27-alpine
    container_name: mitr-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./generated/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/mitr/certbot-www:/var/www/certbot
    cpus: 0.10
    mem_limit: 96m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mitr-internal

networks:
  mitr-internal:
    driver: bridge

volumes:
  voice_notes_data:
