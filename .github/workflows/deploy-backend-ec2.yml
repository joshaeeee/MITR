name: MITR Backend CI/CD (EC2)

on:
  pull_request:
    branches: [main]
    paths:
      - "mitr-backend/**"
      - "minimal/**"
      - ".github/workflows/deploy-backend-ec2.yml"
  push:
    branches: [main]
    paths:
      - "mitr-backend/**"
      - "minimal/**"
      - ".github/workflows/deploy-backend-ec2.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to EC2 after build"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: mitr-backend-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Backend CI (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mitr-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            mitr-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        env:
          NODE_ENV: test
          POSTGRES_URL: https://example.com/postgres
          REDIS_URL: redis://localhost:6379
          MEM0_API_KEY: test-mem0-key
          MEM0_BASE_URL: https://api.mem0.ai
          QDRANT_URL: https://example.com/qdrant
          QDRANT_API_KEY: test-qdrant-key
          QDRANT_COLLECTION: religious_texts
        run: pnpm test:unit

      - name: Firmware config secret guard
        working-directory: .
        run: |
          set -euo pipefail
          test -x minimal/check-production-config.sh
          if grep -REn 'CONFIG_(MITR_DEVICE_(ACCESS_TOKEN|PAIRING_TOKEN)|MITR_WIFI_PASSWORD)="[^"]+"' minimal/sdkconfig.defaults* minimal/main/Kconfig.projbuild; then
            echo "Firmware defaults must not contain baked device tokens or Wi-Fi passwords." >&2
            exit 1
          fi

      - name: Repository secret scan
        working-directory: .
        run: scripts/check-repo-secrets.sh

      - name: Local workspace secret scan
        working-directory: .
        run: scripts/check-local-workspace-secrets.sh

      - name: Route auth coverage guard
        working-directory: .
        run: node scripts/check-route-auth-coverage.mjs

      - name: RBAC invariant guard
        working-directory: .
        run: node scripts/check-rbac-invariants.mjs

      - name: Security abuse smoke syntax guard
        working-directory: .
        run: |
          bash -n scripts/security-abuse-smoke.sh
          node --check scripts/security-abuse-seed-and-smoke.mjs

      - name: Service env scope guard
        working-directory: mitr-backend
        run: |
          set -euo pipefail
          cp deploy/.env.prod.pipecat-gateway.template deploy/.env.prod.pipecat-gateway
          cp deploy/.env.prod.reminder-worker.template deploy/.env.prod.reminder-worker
          cp deploy/.env.prod.insights-worker.template deploy/.env.prod.insights-worker
          cp deploy/.env.prod.digest-worker.template deploy/.env.prod.digest-worker
          deploy/check-service-env-scope.sh
          rm -f deploy/.env.prod.pipecat-gateway deploy/.env.prod.reminder-worker deploy/.env.prod.insights-worker deploy/.env.prod.digest-worker

      - name: Production preflight template guard
        working-directory: mitr-backend
        run: |
          set -euo pipefail
          test -x deploy/preflight-prod-env.sh
          cp deploy/.env.prod.template deploy/.env.prod
          cp deploy/.env.prod.pipecat-gateway.template deploy/.env.prod.pipecat-gateway
          cp deploy/.env.prod.reminder-worker.template deploy/.env.prod.reminder-worker
          cp deploy/.env.prod.insights-worker.template deploy/.env.prod.insights-worker
          cp deploy/.env.prod.digest-worker.template deploy/.env.prod.digest-worker
          if deploy/preflight-prod-env.sh deploy/.env.prod; then
            echo "Template preflight should fail while placeholders are present." >&2
            exit 1
          fi
          rm -f deploy/.env.prod deploy/.env.prod.pipecat-gateway deploy/.env.prod.reminder-worker deploy/.env.prod.insights-worker deploy/.env.prod.digest-worker

      - name: Build
        run: pnpm build

  docker-smoke-pr:
    name: Dockerfile smoke build (PR only)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Dockerfile (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./mitr-backend
          file: mitr-backend/Dockerfile.api
          push: false
          load: false
          cache-from: type=gha,scope=mitr-api-pr
          cache-to: type=gha,mode=max,scope=mitr-api-pr

      - name: Build Pipecat Gateway Dockerfile (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./mitr-backend
          file: mitr-backend/Dockerfile.agent
          push: false
          load: false
          cache-from: type=gha,scope=mitr-pipecat-gateway-pr
          cache-to: type=gha,mode=max,scope=mitr-pipecat-gateway-pr

  build-api:
    name: Build + push API image
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name != 'pull_request'
    environment: Production
    permissions:
      contents: read
      id-token: write
    outputs:
      image_ref: ${{ steps.out.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate ECR deploy secrets
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_API_REPOSITORY: ${{ secrets.ECR_API_REPOSITORY }}
        run: |
          set -euo pipefail
          test -n "${AWS_DEPLOY_ROLE_ARN}" || { echo "Missing secret: AWS_DEPLOY_ROLE_ARN"; exit 1; }
          test -n "${AWS_REGION}" || { echo "Missing secret: AWS_REGION"; exit 1; }
          test -n "${ECR_API_REPOSITORY}" || { echo "Missing secret: ECR_API_REPOSITORY"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_API_REPOSITORY: ${{ secrets.ECR_API_REPOSITORY }}
        run: |
          set -euo pipefail
          ecr_registry="${ECR_API_REPOSITORY%%/*}"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ecr_registry}"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./mitr-backend
          file: mitr-backend/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.ECR_API_REPOSITORY }}:sha-${{ github.sha }}
            ${{ secrets.ECR_API_REPOSITORY }}:prod-latest
          cache-from: type=gha,scope=mitr-api
          cache-to: type=gha,mode=max,scope=mitr-api
          provenance: false

      - name: Set API output
        id: out
        env:
          ECR_API_REPOSITORY: ${{ secrets.ECR_API_REPOSITORY }}
        run: echo "image_ref=${ECR_API_REPOSITORY}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  build-pipecat-gateway:
    name: Build + push Pipecat gateway image
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name != 'pull_request'
    environment: Production
    permissions:
      contents: read
      id-token: write
    outputs:
      image_ref: ${{ steps.out.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate ECR deploy secrets
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_PIPECAT_GATEWAY_REPOSITORY: ${{ secrets.ECR_PIPECAT_GATEWAY_REPOSITORY }}
        run: |
          set -euo pipefail
          test -n "${AWS_DEPLOY_ROLE_ARN}" || { echo "Missing secret: AWS_DEPLOY_ROLE_ARN"; exit 1; }
          test -n "${AWS_REGION}" || { echo "Missing secret: AWS_REGION"; exit 1; }
          test -n "${ECR_PIPECAT_GATEWAY_REPOSITORY}" || { echo "Missing secret: ECR_PIPECAT_GATEWAY_REPOSITORY"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_PIPECAT_GATEWAY_REPOSITORY: ${{ secrets.ECR_PIPECAT_GATEWAY_REPOSITORY }}
        run: |
          set -euo pipefail
          ecr_registry="${ECR_PIPECAT_GATEWAY_REPOSITORY%%/*}"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ecr_registry}"

      - name: Build and push Pipecat gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./mitr-backend
          file: mitr-backend/Dockerfile.agent
          push: true
          tags: |
            ${{ secrets.ECR_PIPECAT_GATEWAY_REPOSITORY }}:sha-${{ github.sha }}
            ${{ secrets.ECR_PIPECAT_GATEWAY_REPOSITORY }}:prod-latest
          cache-from: type=gha,scope=mitr-pipecat-gateway
          cache-to: type=gha,mode=max,scope=mitr-pipecat-gateway
          provenance: false

      - name: Set Pipecat gateway output
        id: out
        env:
          ECR_PIPECAT_GATEWAY_REPOSITORY: ${{ secrets.ECR_PIPECAT_GATEWAY_REPOSITORY }}
        run: echo "image_ref=${ECR_PIPECAT_GATEWAY_REPOSITORY}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-api, build-pipecat-gateway]
    environment: Production
    permissions:
      contents: read
      id-token: write
    if: |
      github.event_name != 'pull_request' &&
      vars.PRODUCTION_DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'push' || inputs.deploy == true)
    timeout-minutes: 20
    steps:
      - name: Validate deploy secrets
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "${AWS_DEPLOY_ROLE_ARN}" || { echo "Missing secret: AWS_DEPLOY_ROLE_ARN"; exit 1; }
          test -n "${AWS_REGION}" || { echo "Missing secret: AWS_REGION"; exit 1; }
          test -n "${EC2_INSTANCE_ID}" || { echo "Missing secret: EC2_INSTANCE_ID"; exit 1; }
          test -n "${PUBLIC_API_BASE_URL}" || { echo "Missing secret: PUBLIC_API_BASE_URL"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy through Systems Manager
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          API_IMAGE: ${{ needs.build-api.outputs.image_ref }}
          PIPECAT_GATEWAY_IMAGE: ${{ needs.build-pipecat-gateway.outputs.image_ref }}
        run: |
          set -euo pipefail
          jq -n \
            --arg api_image "${API_IMAGE}" \
            --arg gateway_image "${PIPECAT_GATEWAY_IMAGE}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg region "${AWS_REGION}" \
            --arg sha "${GITHUB_SHA}" \
            '{
              commands: [
                "set -euo pipefail",
                "install -d -o ubuntu -g ubuntu -m 0755 /opt/mitr",
                "if [ ! -d /opt/mitr/MITR/.git ]; then sudo -u ubuntu git clone https://github.com/" + $repository + ".git /opt/mitr/MITR; fi",
                "sudo -u ubuntu git -C /opt/mitr/MITR fetch origin main",
                "sudo -u ubuntu git -C /opt/mitr/MITR checkout --detach " + $sha,
                "cd /opt/mitr/MITR/mitr-backend",
                "export AWS_REGION=" + $region,
                "export DEPLOY_API_IMAGE=" + $api_image,
                "export DEPLOY_PIPECAT_GATEWAY_IMAGE=" + $gateway_image,
                "export DEPLOY_REMINDER_IMAGE=" + $api_image,
                "export HEALTH_BASE_URL=http://127.0.0.1",
                "export RUN_DB_MIGRATIONS=true",
                "export ALLOW_IMAGE_ROLLBACK_AFTER_MIGRATIONS=false",
                "bash deploy/deploy.sh",
                "test \"$(docker inspect --format={{.Config.Image}} mitr-api)\" = \"" + $api_image + "\"",
                "test \"$(docker inspect --format={{.Config.Image}} mitr-pipecat-gateway)\" = \"" + $gateway_image + "\""
              ]
            }' > ssm-parameters.json

          command_id="$(
            aws ssm send-command \
              --region "${AWS_REGION}" \
              --instance-ids "${EC2_INSTANCE_ID}" \
              --document-name AWS-RunShellScript \
              --comment "MITR deploy ${GITHUB_SHA}" \
              --parameters file://ssm-parameters.json \
              --cloud-watch-output-config \
                CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/mitr/deploy \
              --query 'Command.CommandId' \
              --output text
          )"

          aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "${command_id}" \
            --instance-id "${EC2_INSTANCE_ID}" || true

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${command_id}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --output json > command-result.json

          jq -r '.StandardOutputContent, .StandardErrorContent' command-result.json
          test "$(jq -r '.Status' command-result.json)" = "Success"

  smoke-public:
    name: Public smoke check
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success'
    timeout-minutes: 5
    steps:
      - name: Check public health endpoints
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
        run: |
          set -euo pipefail
          BASE_URL="${PUBLIC_API_BASE_URL}"
          BASE_URL="${BASE_URL%/}"
          curl -fsS --max-time 10 "${BASE_URL}/healthz" >/dev/null
          echo "Public smoke checks passed for ${BASE_URL}"
