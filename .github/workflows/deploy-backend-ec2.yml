name: MITR Backend CI/CD (EC2)

on:
  pull_request:
    branches: [main]
    paths:
      - "mitr-backend/**"
      - "minimal/**"
      - ".github/workflows/deploy-backend-ec2.yml"
  push:
    branches: [main]
    paths:
      - "mitr-backend/**"
      - "minimal/**"
      - ".github/workflows/deploy-backend-ec2.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to EC2 after build"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: mitr-backend-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository_owner }}/mitr-api
  PIPECAT_GATEWAY_IMAGE_NAME: ${{ github.repository_owner }}/mitr-pipecat-gateway

jobs:
  ci:
    name: Backend CI (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mitr-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            mitr-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        env:
          NODE_ENV: test
          POSTGRES_URL: https://example.com/postgres
          REDIS_URL: redis://localhost:6379
          MEM0_API_KEY: test-mem0-key
          MEM0_BASE_URL: https://api.mem0.ai
          QDRANT_URL: https://example.com/qdrant
          QDRANT_API_KEY: test-qdrant-key
          QDRANT_COLLECTION: religious_texts
        run: pnpm test:unit

      - name: Firmware config secret guard
        working-directory: .
        run: |
          set -euo pipefail
          test -x minimal/check-production-config.sh
          if grep -REn 'CONFIG_(MITR_DEVICE_(ACCESS_TOKEN|PAIRING_TOKEN)|LK_EXAMPLE_WIFI_PASSWORD)="[^"]+"' minimal/sdkconfig.defaults* minimal/main/Kconfig.projbuild; then
            echo "Firmware defaults must not contain baked device tokens or Wi-Fi passwords." >&2
            exit 1
          fi

      - name: Repository secret scan
        working-directory: .
        run: scripts/check-repo-secrets.sh

      - name: Local workspace secret scan
        working-directory: .
        run: scripts/check-local-workspace-secrets.sh

      - name: Route auth coverage guard
        working-directory: .
        run: node scripts/check-route-auth-coverage.mjs

      - name: RBAC invariant guard
        working-directory: .
        run: node scripts/check-rbac-invariants.mjs

      - name: Security abuse smoke syntax guard
        working-directory: .
        run: |
          bash -n scripts/security-abuse-smoke.sh
          node --check scripts/security-abuse-seed-and-smoke.mjs

      - name: Service env scope guard
        working-directory: mitr-backend
        run: |
          set -euo pipefail
          cp deploy/.env.prod.pipecat-gateway.template deploy/.env.prod.pipecat-gateway
          cp deploy/.env.prod.reminder-worker.template deploy/.env.prod.reminder-worker
          cp deploy/.env.prod.insights-worker.template deploy/.env.prod.insights-worker
          cp deploy/.env.prod.digest-worker.template deploy/.env.prod.digest-worker
          deploy/check-service-env-scope.sh
          rm -f deploy/.env.prod.pipecat-gateway deploy/.env.prod.reminder-worker deploy/.env.prod.insights-worker deploy/.env.prod.digest-worker

      - name: Production preflight template guard
        working-directory: mitr-backend
        run: |
          set -euo pipefail
          test -x deploy/preflight-prod-env.sh
          cp deploy/.env.prod.template deploy/.env.prod
          cp deploy/.env.prod.pipecat-gateway.template deploy/.env.prod.pipecat-gateway
          cp deploy/.env.prod.reminder-worker.template deploy/.env.prod.reminder-worker
          cp deploy/.env.prod.insights-worker.template deploy/.env.prod.insights-worker
          cp deploy/.env.prod.digest-worker.template deploy/.env.prod.digest-worker
          if deploy/preflight-prod-env.sh deploy/.env.prod; then
            echo "Template preflight should fail while placeholders are present." >&2
            exit 1
          fi
          rm -f deploy/.env.prod deploy/.env.prod.pipecat-gateway deploy/.env.prod.reminder-worker deploy/.env.prod.insights-worker deploy/.env.prod.digest-worker

      - name: Build
        run: pnpm build

  docker-smoke-pr:
    name: Dockerfile smoke build (PR only)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Dockerfile (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./mitr-backend
          file: mitr-backend/Dockerfile.api
          push: false
          load: false
          cache-from: type=gha,scope=mitr-api-pr
          cache-to: type=gha,mode=max,scope=mitr-api-pr

      - name: Build Pipecat Gateway Dockerfile (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./mitr-backend
          file: mitr-backend/Dockerfile.agent
          push: false
          load: false
          cache-from: type=gha,scope=mitr-pipecat-gateway-pr
          cache-to: type=gha,mode=max,scope=mitr-pipecat-gateway-pr

  build-api:
    name: Build + push API image
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name != 'pull_request'
    outputs:
      image_ref: ${{ steps.out.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./mitr-backend
          file: mitr-backend/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:prod-latest
          cache-from: type=gha,scope=mitr-api
          cache-to: type=gha,mode=max,scope=mitr-api
          provenance: false

      - name: Set API output
        id: out
        run: echo "image_ref=${REGISTRY}/${API_IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  build-pipecat-gateway:
    name: Build + push Pipecat gateway image
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name != 'pull_request'
    outputs:
      image_ref: ${{ steps.out.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Pipecat gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./mitr-backend
          file: mitr-backend/Dockerfile.agent
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PIPECAT_GATEWAY_IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PIPECAT_GATEWAY_IMAGE_NAME }}:prod-latest
          cache-from: type=gha,scope=mitr-pipecat-gateway
          cache-to: type=gha,mode=max,scope=mitr-pipecat-gateway
          provenance: false

      - name: Set Pipecat gateway output
        id: out
        run: echo "image_ref=${REGISTRY}/${PIPECAT_GATEWAY_IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-api, build-pipecat-gateway]
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name == 'push' || inputs.deploy == true)
    timeout-minutes: 20
    steps:
      - name: Validate deploy secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          GHCR_TOKEN: ${{ github.token }}
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          test -n "${EC2_HOST}" || { echo "Missing secret: EC2_HOST"; exit 1; }
          test -n "${EC2_USER}" || { echo "Missing secret: EC2_USER"; exit 1; }
          test -n "${EC2_SSH_KEY}" || { echo "Missing secret: EC2_SSH_KEY"; exit 1; }
          test -n "${GHCR_TOKEN}" || { echo "Missing secret: GHCR_TOKEN"; exit 1; }
          test -n "${EC2_SG_ID}" || { echo "Missing secret: EC2_SG_ID"; exit 1; }
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "Missing secret: AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "Missing secret: AWS_SECRET_ACCESS_KEY"; exit 1; }
          test -n "${AWS_REGION}" || { echo "Missing secret: AWS_REGION"; exit 1; }

      - name: Add runner IP to security group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)
          echo "RUNNER_IP=${RUNNER_IP}" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32"
          echo "Allowed SSH from ${RUNNER_IP}/32"

      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            set -x
            trap 'rc=$?; line=${BASH_LINENO[0]:-unknown}; echo "[deploy] failed at line ${line} while running: ${BASH_COMMAND} (exit ${rc})"; exit ${rc}' ERR

            BASE_DIR="/opt/mitr"
            REPO_DIR="${BASE_DIR}/MITR"
            APP_DIR="${REPO_DIR}/mitr-backend"
            REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

            mkdir -p "${BASE_DIR}"
            if [ ! -d "${REPO_DIR}/.git" ]; then
              echo "[deploy] cloning repo into ${REPO_DIR}"
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi

            echo "[deploy] preparing clean checkout"
            cd "${REPO_DIR}"
            git remote set-url origin "${REPO_URL}"
            mkdir -p .deploy-tmp
            if [ -f "mitr-backend/deploy/.env.prod" ]; then
              cp "mitr-backend/deploy/.env.prod" ".deploy-tmp/env.prod"
            fi
            if [ -f "mitr-backend/deploy/.env.prod.pipecat-gateway" ]; then
              cp "mitr-backend/deploy/.env.prod.pipecat-gateway" ".deploy-tmp/env.prod.pipecat-gateway"
            fi
            for worker_env in reminder-worker insights-worker digest-worker; do
              if [ -f "mitr-backend/deploy/.env.prod.${worker_env}" ]; then
                cp "mitr-backend/deploy/.env.prod.${worker_env}" ".deploy-tmp/env.prod.${worker_env}"
              fi
            done
            git reset --hard HEAD
            git clean -fd \
              -e .deploy-tmp/ \
              -e mitr-backend/deploy/generated/ \
              -e mitr-backend/deploy/www/
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd \
              -e .deploy-tmp/ \
              -e mitr-backend/deploy/generated/ \
              -e mitr-backend/deploy/www/
            if [ -f ".deploy-tmp/env.prod" ]; then
              mkdir -p "mitr-backend/deploy"
              cp ".deploy-tmp/env.prod" "mitr-backend/deploy/.env.prod"
            fi
            if [ -f ".deploy-tmp/env.prod.pipecat-gateway" ]; then
              mkdir -p "mitr-backend/deploy"
              cp ".deploy-tmp/env.prod.pipecat-gateway" "mitr-backend/deploy/.env.prod.pipecat-gateway"
            fi
            for worker_env in reminder-worker insights-worker digest-worker; do
              if [ -f ".deploy-tmp/env.prod.${worker_env}" ]; then
                mkdir -p "mitr-backend/deploy"
                cp ".deploy-tmp/env.prod.${worker_env}" "mitr-backend/deploy/.env.prod.${worker_env}"
              fi
            done
            rm -rf .deploy-tmp
            echo "[deploy] checkout ready at $(git rev-parse --short HEAD)"

            cd "${APP_DIR}"
            echo "[deploy] app dir $(pwd)"
            ls -ld deploy
            if [ ! -f "deploy/.env.prod" ]; then
              echo "Missing ${APP_DIR}/deploy/.env.prod. Create it manually from deploy/.env.prod.template"
              ls -la deploy || true
              exit 1
            fi
            echo "[deploy] found deploy/.env.prod"

            update_env() {
              key="$1"
              value="$2"
              # Keep this as a single shell line because appleboy/ssh-action injects
              # guard code after each script line and breaks multiline inline scripts.
              awk -v k="$key" -v v="$value" -F= 'BEGIN{done=0} $1==k {if(!done){print k "=" v; done=1} next} {print} END{if(!done) print k "=" v}' deploy/.env.prod > deploy/.env.prod.tmp && mv deploy/.env.prod.tmp deploy/.env.prod
              echo "[deploy] set ${key}"
            }

            update_env "API_IMAGE" "${{ needs.build-api.outputs.image_ref }}"
            update_env "PIPECAT_GATEWAY_IMAGE" "${{ needs.build-pipecat-gateway.outputs.image_ref }}"
            update_env "REMINDER_IMAGE" "${{ needs.build-api.outputs.image_ref }}"

            GHCR_USER="${{ github.actor }}"
            GHCR_TOKEN_VALUE="${{ github.token }}"
            export GHCR_USERNAME="${GHCR_USER}"
            export GHCR_TOKEN="${GHCR_TOKEN_VALUE}"
            export HEALTH_BASE_URL="http://127.0.0.1"
            export RUN_DB_MIGRATIONS="true"
            export ALLOW_IMAGE_ROLLBACK_AFTER_MIGRATIONS="false"
            export DEPLOY_PUBLIC_API_BASE_URL="${{ secrets.PUBLIC_API_BASE_URL }}"
            export DEPLOY_EC2_HOST="${{ secrets.EC2_HOST }}"

            echo "[deploy] running backend deployment"
            chmod +x deploy/configure-nginx.sh deploy/setup-https.sh deploy/bootstrap-service-env-files.sh deploy/check-service-env-scope.sh deploy/preflight-prod-env.sh || true
            chmod +x deploy/deploy.sh deploy/healthcheck.sh
            bash deploy/deploy.sh

            # Guard against stale image restarts.
            ACTUAL_API_IMAGE="$(docker inspect --format='{{.Config.Image}}' mitr-api)"
            ACTUAL_PIPECAT_GATEWAY_IMAGE="$(docker inspect --format='{{.Config.Image}}' mitr-pipecat-gateway)"
            if [ "${ACTUAL_API_IMAGE}" != "${{ needs.build-api.outputs.image_ref }}" ]; then
              echo "API image mismatch. expected=${{ needs.build-api.outputs.image_ref }} actual=${ACTUAL_API_IMAGE}"
              exit 1
            fi
            if [ "${ACTUAL_PIPECAT_GATEWAY_IMAGE}" != "${{ needs.build-pipecat-gateway.outputs.image_ref }}" ]; then
              echo "Pipecat gateway image mismatch. expected=${{ needs.build-pipecat-gateway.outputs.image_ref }} actual=${ACTUAL_PIPECAT_GATEWAY_IMAGE}"
              exit 1
            fi

      - name: Remove runner IP from security group
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" || true
          echo "Removed SSH access for ${RUNNER_IP}/32"

  smoke-public:
    name: Public smoke check
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success'
    timeout-minutes: 5
    steps:
      - name: Check public health endpoints
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          BASE_URL="${PUBLIC_API_BASE_URL:-http://${EC2_HOST}}"
          BASE_URL="${BASE_URL%/}"
          curl -fsS --max-time 10 "${BASE_URL}/healthz" >/dev/null
          curl -fsS --max-time 10 "${BASE_URL}/health/latency" >/dev/null
          echo "Public smoke checks passed for ${BASE_URL}"
